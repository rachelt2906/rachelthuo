<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  background-color: #fff;
  color: #3a3a3a;
  margin: 0;
  font-size: 16px;
  font-family: ha, "Noto Sans SC", sans-serif;
  font-weight: 300;
  line-height: 1.5;
  min-height: 100vh;
}

:root {
  --ink:     #3a3a3a;
  --muted:   #aaaaaa;
  --soft:    #e8e8e8;
  --mono:    'Space Mono', monospace;
  --display: 'Syne', ha, sans-serif;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.8rem 3.5rem;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.3s;
}
nav.scrolled { border-color: var(--soft); }
.nav-logo { font-size: 0.78rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-logo:hover { color: var(--ink); }
.nav-links { display: flex; gap: 2.5rem; list-style: none; }
.nav-links a { font-size: 0.78rem; color: var(--muted); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--ink); }
.nav-links a.active { color: var(--ink); }

/* ── LAYOUT ── */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 8rem 3.5rem 5rem;
}

/* ── HEADING ── */
.contact-heading {
  font-family: var(--display);
  font-size: clamp(4rem, 11vw, 10.5rem);
  font-weight: 800;
  line-height: 0.9;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 3.5rem;
  opacity: 0;
  animation: up 0.7s 0.1s ease forwards;
}

.contact-heading .dot { color: var(--muted); }

/* ── CONTACT GRID ── */
.contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--soft);
  border-top: 1px solid var(--soft);
  opacity: 0;
  animation: up 0.6s 0.3s ease forwards;
}

.contact-cell {
  background: #fff;
  padding: 2.2rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.contact-cell:nth-child(odd)  { padding-right: 3rem; }
.contact-cell:nth-child(even) { padding-left: 3rem; }

.cell-label {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
}

.cell-value {
  font-size: 1rem;
  color: var(--ink);
  text-decoration: none;
  transition: color 0.2s;
  line-height: 1.4;
}

a.cell-value:hover { color: var(--muted); }

/* ── AVAILABILITY LINE ── */
.availability {
  margin-top: 3.5rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  opacity: 0;
  animation: up 0.6s 0.5s ease forwards;
}

.avail-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #5DBB7A;
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.avail-text {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: var(--muted);
}

@keyframes up {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 700px) {
  nav { padding: 1.4rem 1.5rem; }
  .page { padding: 7rem 1.5rem 4rem; }
  .contact-grid { grid-template-columns: 1fr; gap: 0; }
  .contact-cell:nth-child(odd)  { padding-right: 0; }
  .contact-cell:nth-child(even) { padding-left: 0; }
}
</style>
</head>
